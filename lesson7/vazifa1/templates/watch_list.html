<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <title>Soatlar Ro'yxati</title>
  </head>
  <body>
    <h1>⌚️ Soatlar Do'koni</h1>
    <p><a href="{% url 'watch_create' %}">➕ Yangi soat qo'shish</a></p>
    <hr />

    {% if watches %}
    <div style="display: grid; gap: 16px; max-width: 900px">
      {% for watch in watches %}
      <div
        style="
          padding: 18px;
          border: 1px solid #ddd;
          border-radius: 10px;
          box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
        "
      >
        <h2 style="margin: 0 0 8px">
          <a href="{% url 'watch_detail' watch.id %}">{{ watch.title }}</a>
        </h2>
        <p style="margin: 2px 0"><strong>Brend:</strong> {{ watch.brand }}</p>
        <p style="margin: 2px 0"><strong>Narxi:</strong> {{ watch.price }} $</p>
        <p style="margin: 2px 0">
          <strong>Tavsif:</strong> {{ watch.description|truncatewords:10 }}
        </p>
      </div>
      {% endfor %}
    </div>
    {% else %}
    <p>Hozircha soat mavjud emas.</p>
    {% endif %}
  </body>
</html>
