<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiyimni Tahrirlash</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1e2f 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-card {
            width: 100%;
            max-width: 600px;
            background: #1e293b;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .form-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .form-header h1 {
            font-size: 26px;
            color: #ffffff;
            font-weight: 700;
        }

        .form-header p {
            color: #64748b;
            font-size: 14px;
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            font-size: 15px;
            color: #f1f5f9;
            background-color: rgba(15, 23, 42, 0.6);
            transition: all 0.2s ease;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #4f46e5;
            background-color: #0f172a;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        .form-select option {
            background-color: #1e293b;
            color: #f1f5f9;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-submit {
            background-color: #4f46e5;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-submit:hover {
            background-color: #4338ca;
            transform: translateY(-1px);
        }

        .btn-cancel {
            background-color: rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-cancel:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="form-card">
        <div class="form-header">
            <h1>✏️ Edit Clothing</h1>
            <p>ID: #{{ clothes.id }} — Ma'lumotlarni tahrirlash</p>
        </div>

        <form method="POST">
            {% csrf_token %}

            <!-- Nomi -->
            <div class="form-group">
                <label class="form-label" for="name">👕 Kiyim Nomi (Name)</label>
                <input type="text" id="name" name="name" class="form-input" value="{{ clothes.name|default:'' }}">
            </div>

            <!-- Narxi -->
            <div class="form-group">
                <label class="form-label" for="price">💰 Narxi (Price)</label>
                <input type="number" step="0.01" id="price" name="price" class="form-input" value="{{ clothes.price|stringformat:'f' }}">
            </div>

            <!-- O'lchami (Sintaksis xato bermasligi uchun shartlar JavaScriptga o'tkazildi) -->
            <div class="form-group">
                <label class="form-label" for="size">📏 O'lchami (Size)</label>
                <select id="size" name="size" class="form-select">
                    <option value="">O'lchamni tanlang</option>
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                    <option value="XL">XL</option>
                    <option value="XXL">XXL</option>
                </select>
            </div>

            <!-- Rangi -->
            <div class="form-group">
                <label class="form-label" for="color">🎨 Rangi (Color)</label>
                <input type="text" id="color" name="color" class="form-input" value="{{ clothes.color|default:'' }}">
            </div>

            <div class="btn-group">
                <a href="{% url 'detail' id=clothes.id %}" class="btn btn-cancel">Cancel</a>
                <button type="submit" class="btn btn-submit">Save Changes</button>
            </div>
        </form>
    </div>

    <!-- Qiymatni avtomatik tanlab qo'yuvchi xavfsiz JS skript -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var savedSize = "{{ clothes.size }}";
            if (savedSize) {
                document.getElementById("size").value = savedSize;
            }
        });
    </script>

</body>
</html>
